version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: proxy_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: proxy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d proxy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proxy_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: proxy_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/proxy_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key
      EMAIL_BACKEND: console
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: mailtrap_username
      SMTP_PASSWORD: mailtrap_password
      SMTP_FROM_EMAIL: no-reply@proxy-service.local
      SMTP_USE_TLS: "true"
      PUBLIC_WS_BASE_URL: ws://localhost:8000
      AUTO_SEED_VMS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: ./backend
    container_name: proxy_celery
    command: celery -A app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/proxy_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key
      EMAIL_BACKEND: console
      SMTP_HOST: smtp.mailtrap.io
      SMTP_PORT: 2525
      SMTP_USER: mailtrap_username
      SMTP_PASSWORD: mailtrap_password
      SMTP_FROM_EMAIL: no-reply@proxy-service.local
      SMTP_USE_TLS: "true"
      PUBLIC_WS_BASE_URL: ws://localhost:8000
      AUTO_SEED_VMS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build: ./backend
    container_name: proxy_flower
    command: celery -A app.celery_app flower --address=0.0.0.0 --port=5555
    ports:
      - "5555:5555"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker

  frontend:
    build: ./frontend
    container_name: proxy_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  frontend_dev:
    image: node:18-alpine
    container_name: proxy_frontend_dev
    profiles:
      - dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      VITE_WS_PROXY_TARGET: ws://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
